<style>
    body {
        margin: 0;
        background: #222;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
    }

    .portrait-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        margin-top: 24px;
        width: 100vw;
        max-width: 100vw;
    }

    @media (min-aspect-ratio: 4/3) {
        .portrait-container {
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
    }

    #gameBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    #gameCanvas {
        background: #111;
        border-radius: 12px;
        box-shadow: 0 4px 24px #000a;
        display: block;
        border: 1px solid red;
    }

    #inputPanel {
        width: 100%;
        position: relative;
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 16px;
        margin-bottom: 8px;
    }

    #skipBtn {
        position: absolute;
        width: 80px;
        height: 32px;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.9rem;
        background: #555;
        color: #fff;
        border: none;
        padding: 8px 12px;
        cursor: pointer;
        display: none; /* Hidden by default, can be shown if needed */
    }

    .gameBtn {
        width: 100px;
        height: 64px;
        font-size: 1.5rem;
        border-radius: 8px;
        border: none;
        background: #444;
        color: #fff;
        box-shadow: 0 2px 8px #0005;
        touch-action: manipulation;
        user-select: none;
        transition: background 0.2s;
    }

    .gameBtn:active {
        background: #666;
    }
</style>
<div class="portrait-container">
    <div id="gameBox">
        <canvas id="gameCanvas"></canvas>
        <div id="inputPanel">
            <button class="gameBtn" id="btnLeft">◀️ Left</button>
            <button class="gameBtn" id="btnRight">Right ▶️</button>
            <button id="skipBtn" onclick="skipGame()">Skip</button>
        </div>
    </div>
</div>
<script>
    /*
    class GameBridge(
    private val mainHandler: Handler,
    private val onGameFinishedCallback: (Long) -> Unit,
    private val onInteractionCallback: () -> Unit,
) {
    @JavascriptInterface
    fun onGameFinished(score: Long) {
        mainHandler.post { onGameFinishedCallback(score) }
    }
    @JavascriptInterface
    fun onInteraction() {
        mainHandler.post { onInteractionCallback() }
    }
}
    WebView(context).apply {
            settings.javaScriptEnabled = true
            addJavascriptInterface(GameBridge(
                webViewHandler,
                onGameFinished,
                onInteraction,
            ), "AndroidBridge")
            loadUrl("file:///android_asset/webview_games/${gameFilename}")
        }
    */
    // Set up
    let GAME_SIZE = 0;

    let debugPrintAccumulator = 1000;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameBox = document.getElementById('gameBox');
    const inputPanel = document.getElementById('inputPanel');
    const skipBtn = document.getElementById('skipBtn');
    const dpr = window.devicePixelRatio || 1;


    const local = window.AndroidBridge ? true : false;

    const onGameFinishedCallback = local ? window.AndroidBridge.onGameFinished() : () => { };
    const onInteractionCallback = local ? window.AndroidBridge.onInteraction() : () => { };
    if (local) {
        // Show skip button if running in Android WebView
        skipBtn.style.display = 'block';
        skipBtn.onclick = () => {
            onGameFinishedCallback(0); // Send score 0 on skip
        };
    }
    let lastInteractionTime = 0;
    // Call onInteractionCallback whenever the user interacts (for idle detection) with 2 seconds debounce
    function userInteracted() {
        const now = Date.now();
        if (now - lastInteractionTime > 2000) {
            onInteractionCallback();
            lastInteractionTime = now;
        }
    }
    
    // Responsive sizing
    function getGameSize() {
        // Slightly smaller than 720p width, square, to fit well on mobile screens and scale up on larger screens
        // At least 680px, but scales up with higher resolutions, always square
        if (window.innerWidth >= 720) {
            return 680;
        }
        return Math.min(window.innerWidth, window.innerHeight);
    }
    function resizeCanvas() {
        GAME_SIZE = getGameSize();
        canvas.width = GAME_SIZE;
        canvas.height = GAME_SIZE;
        gameBox.style.width = GAME_SIZE + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Game logic
    // --- Brick Breaker Game ---
    const ROWS = 4, COLS = 4;
    let bricks = [];
    let aliveBricks = 0;
    let paddle = { w: 100, h: 16, x: 0, y: 0, speed: 0 };
    let ball = { x: 0, y: 0, r: 10, vx: 0, vy: 0 };
    let score = 0;
    let running = true;

    function debugSize() {
        ctx.strokeStyle = 'blue';
        ctx.lineWidth = 1;
        ctx.strokeRect(0, 0, GAME_SIZE, GAME_SIZE);
    }

    function printDebugs(delta) {
        debugPrintAccumulator -= delta;
        if (debugPrintAccumulator <= 0) {
            console.log(`Game Size: ${GAME_SIZE}, 
            Paddle: (${paddle.x.toFixed(1)}, ${paddle.y}), 
            Ball: (${ball.x.toFixed(1)}, ${ball.y}), 
            Score: ${score}`);
            debugPrintAccumulator = 1000;
        }
    }

    function resetGame() {
        debugSize();
        // Bricks
        bricks = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                bricks.push({ x: c, y: r, alive: true });
            }
        }
        aliveBricks = ROWS * COLS;
        // Paddle
        const size = GAME_SIZE;
        paddle.w = Math.max(80, size / 5);
        paddle.h = 16;
        paddle.x = (size - paddle.w) / 2;
        paddle.y = size - 40;
        paddle.speed = 0;
        // Ball
        ball.r = Math.max(8, size / 48);
        ball.x = size / 2;
        ball.y = paddle.y - ball.r - 2;
        ball.vx = (Math.random() > 0.5 ? 1 : -1) * (size / 240);
        ball.vy = -size / 180;
        score = 0;
        running = true;
    }
    resetGame();

    function draw() {
        const size = GAME_SIZE;
        ctx.clearRect(0, 0, size, size);
        // Draw bricks
        const brickW = (size - 40) / COLS, brickH = 24;
        for (const b of bricks) {
            if (!b.alive) continue;
            ctx.fillStyle = '#2ad';
            ctx.fillRect(20 + b.x * brickW, 32 + b.y * brickH, brickW - 6, brickH - 6);
        }
        // Draw paddle
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
        ctx.restore();
        // Draw ball
        ctx.save();
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fa2';
        ctx.fill();
        ctx.restore();
        // Draw score
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.font = '20px sans-serif';
        ctx.fillText('Score: ' + score, 20, size - 12);
        ctx.restore();
    }

    function update(delta) {
        if (!running) return;
        const size = GAME_SIZE;
        // Move paddle
        paddle.x += paddle.speed * delta / 16;
        paddle.x = Math.max(0, Math.min(size - paddle.w, paddle.x));
        // Move ball
        ball.x += ball.vx * delta / 16;
        ball.y += ball.vy * delta / 16;
        // Wall collision
        if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -1; }
        if (ball.x + ball.r > size) { ball.x = size - ball.r; ball.vx *= -1; }
        if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }
        // Paddle collision
        if (
            ball.y + ball.r > paddle.y &&
            ball.x > paddle.x && ball.x < paddle.x + paddle.w &&
            ball.y < paddle.y + paddle.h + ball.r
        ) {
            ball.y = paddle.y - ball.r;
            // Calculate hit position: -1 (left edge) to 1 (right edge)
            const hitNorm = ((ball.x - paddle.x) / paddle.w) * 2 - 1;
            // Add to vx based on hitNorm, but keep total speed constant
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            // Tweak factor: how much the hitNorm affects vx (tuneable)
            const tweak = speed * 0.6; // 0.6 is a sensitivity factor
            ball.vx += hitNorm * tweak;
            // Clamp vx to not exceed 90% of speed (to avoid too flat angles)
            const maxVx = speed * 0.9;
            if (ball.vx > maxVx) ball.vx = maxVx;
            if (ball.vx < -maxVx) ball.vx = -maxVx;
            // Recalculate vy to preserve speed, always negative (up)
            const newVy = -Math.sqrt(Math.max(0.01, speed * speed - ball.vx * ball.vx));
            ball.vy = newVy;
        }
        // Brick collision
        for (const b of bricks) {
            if (!b.alive) continue;
            const brickW = (size - 40) / COLS, brickH = 24;
            const bx = 20 + b.x * brickW, by = 32 + b.y * brickH;
            if (
                ball.x > bx && ball.x < bx + brickW - 6 &&
                ball.y - ball.r < by + brickH - 6 && ball.y + ball.r > by
            ) {
                b.alive = false;
                aliveBricks--;
                score++;
                ball.vy *= -1;
                break;
            }
        }
        // Lose condition
        if (ball.y - ball.r > size) {
            running = false;
            setTimeout(() => { resetGame(); }, 1200);
        }
        // Win condition
        if (bricks.every(b => !b.alive)) {
            running = false;
            setTimeout(() => { resetGame(); }, 1200);
        }
    }

    function checkWinCon() {
        if (aliveBricks === 0) {
            running = false;
            return true;
        }
        return false;
    }

    // --- Input Panel ---
    let leftPressed = false, rightPressed = false;
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');

    function setPaddleSpeed() {
        const size = GAME_SIZE;
        if (leftPressed && !rightPressed) paddle.speed = -size / 80;
        else if (rightPressed && !leftPressed) paddle.speed = size / 80;
        else paddle.speed = 0;
    }

    btnLeft.addEventListener('touchstart', e => { leftPressed = true; setPaddleSpeed(); e.preventDefault(); userInteracted(); });
    btnLeft.addEventListener('touchend', e => { leftPressed = false; setPaddleSpeed(); e.preventDefault(); });
    btnRight.addEventListener('touchstart', e => { rightPressed = true; setPaddleSpeed(); e.preventDefault(); userInteracted(); });
    btnRight.addEventListener('touchend', e => { rightPressed = false; setPaddleSpeed(); e.preventDefault(); });
    // Also support mouse for desktop testing
    btnLeft.addEventListener('mousedown', e => { leftPressed = true; setPaddleSpeed(); });
    btnLeft.addEventListener('mouseup', e => { leftPressed = false; setPaddleSpeed(); });
    btnRight.addEventListener('mousedown', e => { rightPressed = true; setPaddleSpeed(); });
    btnRight.addEventListener('mouseup', e => { rightPressed = false; setPaddleSpeed(); });

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') { leftPressed = true; setPaddleSpeed(); }
        if (e.key === 'ArrowRight') { rightPressed = true; setPaddleSpeed(); }
    });
    window.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft') { leftPressed = false; setPaddleSpeed(); }
        if (e.key === 'ArrowRight') { rightPressed = false; setPaddleSpeed(); }
    });

    // --- Game Loop ---
    let lastTime = 0;
    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const delta = timestamp - lastTime;
        lastTime = timestamp;
        update(delta);
        draw();
        if (!checkWinCon()) {
            requestAnimationFrame(gameLoop);
        } else {
            onGameFinishedCallback(score);
        }
    }
    window.onload = () => {
        requestAnimationFrame(gameLoop);
    };
</script>
