<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; }
        html { width: 100%; height: 100%; min-height: 440px; overflow: hidden; }
        body { width: 100%; height: 100%; min-height: 440px; overflow: hidden; background: #888; }
        #game-container { position: relative; width: 100%; height: 100%; }
        #skip-button {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1;
            border-radius: 50%;
        }
        #skip-button img {
            /* filter: invert(100%); */
            width: 40px; 
            height: 40px; 
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <button id="skip-button">
        <img src="skip_icon.png" alt="Skip">
    </button>
    <script src="phaser.min.js"></script>
    <script src="spikes2.bundle.js"></script>
    <script type="module">
        import Bridge from './AndroidBridge.js';
        const skipButton = document.getElementById('skip-button');
        skipButton.addEventListener('click', () => {
            if (Bridge.isSkippable()) {
                Bridge.onGameFinished(0); // Notify Android that the game is finished with a score of 0
            }
        });
        console.log(window.innerHeight, window.innerWidth);
         // Initialize Phaser game
    </script>
</body>
</html>
